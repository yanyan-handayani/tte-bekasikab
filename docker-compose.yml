services:
  db:
    image: mysql:8.4
    container_name: tte_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: tte_minio
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio_init:
    image: minio/mc:RELEASE.2025-01-17T23-36-08Z
    container_name: tte_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local ${MINIO_ENDPOINT} ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/${MINIO_STATIC_BUCKET} || true &&
      mc mb -p local/${MINIO_MEDIA_BUCKET} || true &&
      mc anonymous set download local/${MINIO_STATIC_BUCKET} || true &&
      echo 'MinIO buckets ensured.' "
    restart: "no"

  web:
    image: registry.gabuspucung.id/tte/tte-backend:latest
    container_name: tte_web
    restart: unless-stopped
    env_file: .env
    environment:
      # override agar container connect ke service db (bukan 127.0.0.1)
      DB_HOST: db
      DB_PORT: 3306

      # override minio endpoint dari dalam network docker
      MINIO_ENDPOINT: http://minio:9000

      # optional: untuk collectstatic (kalau kamu pakai)
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      # kalau kamu butuh file .env dibaca dari BASE_DIR/.env, env_file sudah cukup.
      # tapi kalau kamu memang ingin file fisiknya ada di container:
      # - ./.env:/app/.env:ro
      - web_static:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: registry.gabuspucung.id/tte/tte-frontend:latest
    container_name: tte_frontend
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:8080"

volumes:
  db_data:
  minio_data:
  web_static:
